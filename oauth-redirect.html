<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign-in successful</title>
  <style>
    body { font-family: system-ui; text-align: center; padding: 2rem; max-width: 320px; margin: 2rem auto; }
    .error { color: #c00; font-size: 0.9rem; }
  </style>
</head>
<body>
  <p id="msg">Sign-in successful! Returning to app...</p>
  <p id="err" class="error" style="display:none;"></p>
  <script>
    var code = new URLSearchParams(window.location.search).get('code');
    if (!code) {
      document.getElementById('msg').style.display = 'none';
      document.getElementById('err').style.display = 'block';
      document.getElementById('err').textContent = 'No auth code received. Complete sign-in from the Biwa app.';
    }
  </script>
</body>
</html>
